<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nogada Roulette (Web version)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+And+White+Picture&display=swap" rel="stylesheet">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; color: white; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; 
        }
        .screen {
            display: none; 
            position: relative;
            width: 100%; height: 100%; 
            max-width: calc(100vh * (16 / 9)); 
            max-height: calc(100vw * (9 / 16)); 
            aspect-ratio: 16 / 9;
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .screen.active { display: block; }

        #login-screen { background-image: url('images/00login.png'); }
        #lobby-screen { background-image: url('images/01lobby.png'); }
        #room-screen { background-image: url('images/02room.png'); }

        .ui-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; text-align: center; }
        input, button { padding: 10px; margin: 5px; font-size: 16px; cursor: pointer; }

        .player-sprite {
            position: absolute; bottom: 0%; left: 50%; transform: translateX(-50%); 
            width: 60%; height: auto; z-index: 10;
        }
        .enemy-sprite {
            position: absolute; top: 33.4%; left: 50%; transform: translate(-50%, -50%);
            width: 48%; height: auto; z-index: 5;
        }

        #left-ui {
            position: absolute; left: 3%; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 20;
        }
        .action-btn { background: #222; color: #fff; border: 2px solid #555; padding: 15px 20px; font-size: 1.5vw; text-align: left; transition: 0.2s; }
        .action-btn:hover { background: #444; }
        .action-btn.confirm { background: #8b0000; border-color: #ff0000; font-weight: bold; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #right-ui {
            position: absolute; right: 0; top: 0; height: 100%; 
            width: 25%; 
            display: flex; flex-direction: column; 
            /* 요소를 위쪽으로 정렬 */
            justify-content: flex-start; 
            /* ===== [수정됨] 25vh ➔ 5vh로 확 줄여서 위로 바짝 끌어올림! ===== */
            padding-top: 5vh; 
            gap: 30px;
            z-index: 50; 
            background-color: #000000; 
            padding-left: 20px; padding-right: 20px; padding-bottom: 20px; 
            box-sizing: border-box;
            border-left: 4px solid #333; 
        }

        .right-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            opacity: 0.1; 
            z-index: -1; 
            pointer-events: none; 
        }

        .status-text { font-size: 1.8vw; font-weight: bold; margin-bottom: 5px; color: #ddd; }
        .health-bar { font-size: 2vw; letter-spacing: 2px; color: #ffcc00; }
        
        .ammo-cage { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .shell { 
            width: 2.2vw; 
            height: 6vw; 
            border: 2px solid #000; 
            border-radius: 5px 5px 2px 2px;
            position: relative;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.8);
            overflow: hidden; 
        }
        .shell.green { background: linear-gradient(to right, #1a4f31 0%, #2e8b57 50%, #1a4f31 100%); }
        .shell.red { background: linear-gradient(to right, #5c0000 0%, #b22222 50%, #5c0000 100%); } 
        .shell.grey { background: linear-gradient(to right, #333 0%, #888 50%, #333 100%); } 
        .shell::after {
            content: '';
            position: absolute; bottom: 0; left: 0; width: 100%; height: 25%;
            background: linear-gradient(to right, #8a6a1c 0%, #ffd700 50%, #8a6a1c 100%);
            border-top: 2px solid #111; 
        }

        /* ==== 턴 오버레이 (UI 배경 및 비율 수정) ==== */
        #turn-overlay {
            position: absolute; 
            top: 2%; 
            left: 50%; 
            font-size: 2vw; 
            text-shadow: 2px 2px 5px #000; 
            z-index: 30; 
            text-align: center;
            
            /* ===== 새로 추가하는 폰트 설정 ===== */
            font-family: "Black And White Picture", system-ui;
            font-weight: 400;
            font-style: normal;
            /* ==================================== */
            
            background-image: url('images/turnUI.png');
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            
            padding: 2vw 6vw; 
            white-space: pre-line; 
            opacity: 0; 
        }

        /* ==== 턴 오버레이 등장 애니메이션 ==== */
        @keyframes popupTurn {
            0% {
                opacity: 0;
                transform: translateX(-50%) scale(0.7);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
        }

        .turn-animate {
            /* 기존 0.4초에서 0.8초로 2배 느리게 수정하여 페이드인과 확대를 명확히 보여줌 */
            animation: popupTurn 0.8s ease-out forwards;
        }

        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; z-index: 100;
            pointer-events: none; transition: opacity 0.05s ease-out;
        }
        .flash-active { opacity: 0.8 !important; }

        #tool-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-box {
            background: #111; border: 3px solid #555; padding: 40px; border-radius: 10px;
            text-align: center; width: 50%; max-width: 500px;
        }
        .tool-icon { margin-bottom: 20px; }
        .tool-name { font-size: 2.5vw; font-weight: bold; margin-bottom: 15px; color: #fff; }
        .tool-desc { font-size: 1.5vw; margin-bottom: 30px; color: #ccc; line-height: 1.5; }
        .modal-buttons { display: flex; justify-content: center; gap: 20px; }
        .modal-btn { padding: 15px 30px; font-size: 1.5vw; font-weight: bold; background: #333; color: white; border: 2px solid #555; cursor: pointer; }
        .modal-btn:hover { background: #555; }

        @keyframes shake-enemy {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-52%, -48%) rotate(-2deg); }
            50% { transform: translate(-48%, -52%) rotate(2deg); }
            75% { transform: translate(-51%, -49%) rotate(-1deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }
        .shake-enemy-active { animation: shake-enemy 0.1s infinite; }

        @keyframes shake-player {
            0% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-52%) rotate(-2deg); }
            50% { transform: translateX(-48%) rotate(2deg); }
            75% { transform: translateX(-51%) rotate(-1deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }
        .shake-player-active { animation: shake-player 0.1s infinite; }

        /* ==== STAGE 전체 화면 암전 효과 ==== */
        #stage-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            color: white;
            z-index: 300; /* 제일 위로 오도록 설정 */
            display: flex; justify-content: center; align-items: center;
            font-size: 8vw; /* 크고 섬뜩하게 */
            font-family: "Black And White Picture", system-ui; /* 방금 적용한 폰트 사용 */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
        }
        .stage-active {
            opacity: 1 !important;
        }

        /* ==== 턴 오버레이 사라지는 애니메이션 추가 ==== */
        @keyframes fadeOutTurn {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.7); }
        }
        .turn-fade-out {
            animation: fadeOutTurn 0.8s ease-in forwards;
        }

        /* ==== 스테이지 및 턴 인디케이터 스타일 ==== */
        #stage-display {
            /* ===== [수정됨] 좌측 최상단 고정 (대략 x=40, y=30 비율) ===== */
            position: absolute; 
            top: 3%; 
            left: 3%; 
            z-index: 100;
            
            text-align: left;
            font-family: "Black And White Picture", system-ui;
            font-size: 1.8vw;
            color: #bbb;
        }
        #my-turn-status {
            margin-left: 10px;
            color: #333; 
            transition: 0.3s;
            font-family: sans-serif; 
            font-weight: bold;
            font-size: 1.2vw; 
            vertical-align: middle; 
        }
        #my-turn-status.neon-on {
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        #audio-settings-container {
            position: absolute;
            left: 3%;  
            bottom: 3%; 
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
        }
        #audio-panel {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
            font-size: 1.2vw;
            font-family: "Black And White Picture", system-ui;
            height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s ease-in-out;
            transform: translateY(20px);
        }
        #audio-panel.open {
            height: auto;
            opacity: 1;
            transform: translateY(0);
            padding: 15px;
        }
        .audio-ctrl-item { display: flex; align-items: center; gap: 8px; }
        .toggle-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .dot-on { background-color: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .dot-off { background-color: #ff0000; box-shadow: 0 0 8px #ff0000; }

        #btn-speaker {
            font-size: 2vw;
            cursor: pointer;
            background: none;
            border: none;
            color: #888;
            transition: 0.3s;
        }
        #btn-speaker:hover { color: #fff; transform: scale(1.1); }

    </style>
</head>
<body>

    <div id="loading-screen" class="screen active">
        <div class="ui-container">
            <h2>게임 데이터를 불러오는 중입니다...</h2>
            <div id="loading-text" class="health-bar" style="color: #00ff00;">0% 완료</div>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="ui-container">
            <h2>나이트클럽 입장</h2>
            <input type="text" id="playerName" placeholder="이름을 입력하세요"><br>
            <input type="text" id="roomCode" placeholder="방 번호"><br>
            <button id="btn-join">입장하기</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="ui-container">
            <h2>대기실 (방 번호: <span id="display-room"></span>)</h2>
            <ul id="player-list" style="list-style: none; padding: 0;"></ul>
            <button id="btn-ready">게임 준비</button>
        </div>
    </div>

    <div id="room-screen" class="screen">
        <div id="flash-overlay"></div>
        
        <div id="stage-overlay">STAGE 1</div>
        <div id="turn-overlay">대기 중...</div>

        <div id="tool-modal">
            <div class="modal-box">
                <div id="modal-icon" class="tool-icon"></div>
                <div id="modal-name" class="tool-name"></div>
                <div id="modal-desc" class="tool-desc"></div>
                <hr style="border-color: #333; margin-bottom: 20px;">
                <div class="modal-buttons">
                    <button class="modal-btn" onclick="confirmToolUse()">[ 사용한다 ]</button>
                    <button class="modal-btn" onclick="closeToolModal()">[ 취소한다 ]</button>
                </div>
            </div>
        </div>

        <div id="stage-display">
            STAGE <span id="current-stage-num">1</span> 
            <span id="my-turn-status">[ My Turn ]</span>
        </div>

        <div id="audio-settings-container">
            <div id="audio-panel">
                <div class="audio-ctrl-item">
                    BGM <button id="dot-bgm" class="toggle-dot dot-on" onclick="toggleBGM()"></button>
                </div>
                <div style="color: #444;">/</div>
                <div class="audio-ctrl-item">
                    Fx <button id="dot-sfx" class="toggle-dot dot-on" onclick="toggleSFX()"></button>
                </div>
            </div>
            <button id="btn-speaker" onclick="toggleAudioPanel()">🔊</button>
        </div>

        <img id="enemy-img" class="enemy-sprite" src="images/enemy_stand.png" alt="Enemy">
        <img id="player-img" class="player-sprite" src="images/player_stand.png" alt="Player">

        <div id="left-ui">
            <button id="btn-tool" class="action-btn" onclick="openToolModal()">도구 사용 (<span id="tool-count">0</span>)</button>
            <button id="btn-self" class="action-btn" onclick="handleActionClick('self')">본인에게 겨눈다</button>
            <button id="btn-enemy" class="action-btn" onclick="handleActionClick('enemy')">상대에게 겨눈다</button>
        </div>

        <div id="right-ui">
            <img class="right-bg-img" src="images/right_panel.png" alt="Right UI Background">

            <div>
                <div class="status-text">적 생명력</div>
                <div id="enemy-health" class="health-bar"></div>
            </div>
            <hr style="width: 100%; border-color: #333; margin: 10px 0;">
            <div>
                <div class="status-text">내 생명력</div>
                <div id="player-health" class="health-bar"></div>
            </div>
            <hr style="width: 100%; border-color: #333; margin: 10px 0;">
            <div>
                <div class="status-text">탄창 (12게이지)</div>
                <div id="ammo-container" class="ammo-cage"></div>
            </div>
            </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // ==== 턴 오버레이 애니메이션 전용 함수 ====
        function showTurnMessage(msg) {
            const overlay = document.getElementById('turn-overlay');
            overlay.innerHTML = msg;
            
            // 클래스 초기화
            overlay.classList.remove('turn-animate', 'turn-fade-out');
            void overlay.offsetWidth; 
            
            // 페이드 인 + 확대 등장
            overlay.classList.add('turn-animate');

            // 2초 대기 후 페이드 아웃 + 축소
            setTimeout(() => {
                // 이미 새로운 메시지가 떴을 경우를 대비해 현재 텍스트가 일치할 때만 실행하면 좋지만, 
                // 단순히 클래스만 추가해도 부드럽게 연결됩니다.
                overlay.classList.add('turn-fade-out');
            }, 2000);
        }

        // AudioContext + 글로벌 필터
        const audioCtx = new AudioContext();
        const globalFilter = audioCtx.createBiquadFilter();
        globalFilter.type = 'lowpass';
        globalFilter.frequency.value = 20000;
        globalFilter.connect(audioCtx.destination);

        function createAudioSource(url) {
            const audio = new Audio(url);
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(globalFilter);
            return audio;
        }
        const bgm = createAudioSource('sounds/bgm.mp3');
        bgm.loop = true;
        
        document.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });

        // 단일 사운드
        const sfxAiming = createAudioSource('sounds/aiming.wav');
        const sfxAimingEnemy = createAudioSource('sounds/aiming_enemy.wav');
        const sfxAimingMe = createAudioSource('sounds/aiming_me.wav');
        const sfxAimingMeEnemy = createAudioSource('sounds/aiming_me_enemy.wav');
        const sfxStage = createAudioSource('sounds/stage.wav');
        const sfxStageReload = createAudioSource('sounds/stage_reload.wav');
        const sfxHurt = createAudioSource('sounds/hurt.wav');
        const sfxShotFail = createAudioSource('sounds/shot_fail.wav');
        const sfxHurtEnemy = createAudioSource('sounds/hurt_enemy.wav');

        // 랜덤 재생용 (라운드 로빈)
        const sfxShots = [createAudioSource('sounds/shot1.wav'), createAudioSource('sounds/shot2.wav')];
        const sfxReloads = [createAudioSource('sounds/reload1.wav'), createAudioSource('sounds/reload2.wav')];
        let shotIndex = 0;
        let reloadIndex = 0;

        // [수정됨] 효과음 재생을 playSFX로 감싸기
        function playShot(isLive) {
            if (isLive) {
                playSFX(sfxShots[shotIndex++ % 2]);
            } else {
                playSFX(sfxShotFail); 
            }
        }
        function playReload() { playSFX(sfxReloads[reloadIndex++ % 2]); }

        // 피격 시 귀먹은 효과
        function triggerHearingEffect() {
            setTimeout(() => {
                globalFilter.frequency.cancelScheduledValues(audioCtx.currentTime);
                globalFilter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                globalFilter.frequency.linearRampToValueAtTime(20000, audioCtx.currentTime + 10);
            }, 500);
        }
        
        let currentStage = 1;
        let bgmEnabled = true;
        let sfxEnabled = true;

        function toggleAudioPanel() {
            document.getElementById('audio-panel').classList.toggle('open');
        }

        function toggleBGM() {
            bgmEnabled = !bgmEnabled;
            const dot = document.getElementById('dot-bgm');
            if (bgmEnabled) {
                dot.className = 'toggle-dot dot-on';
                bgm.play();
            } else {
                dot.className = 'toggle-dot dot-off';
                bgm.pause();
            }
        }

        function toggleSFX() {
            sfxEnabled = !sfxEnabled;
            const dot = document.getElementById('dot-sfx');
            dot.className = sfxEnabled ? 'toggle-dot dot-on' : 'toggle-dot dot-off';
        }

        // 모든 효과음 재생 시 sfxEnabled를 체크하도록 커스텀 함수 생성
        function playSFX(audioObj) {
            if (sfxEnabled) audioObj.play();
        }

        const imagesToPreload = [
            'images/00login.png', 'images/01lobby.png', 'images/02room.png', 'images/right_panel.png',
            'images/turnUI.png', 
            'images/enemy_stand.png', 'images/player_stand.png',
            'images/enemy_shot.png', 'images/player_shot.png',
            'images/enemy_shot_fake.png', 'images/player_shot_fake.png',
            'images/eh1.png', 'images/eh2.png', 'images/eh3.png',
            'images/ph1.png', 'images/ph2.png', 'images/ph3.png', 'images/ph4.png',
            'images/ef1.png', 'images/ef2.png', 'images/ef3.png',
            'images/player_reload.png', 'images/player_reload_ok.png',
            'images/enemy_reload1.png', 'images/enemy_reload2.png', 'images/enemy_reload_ok.png'
        ];

        let loadedCount = 0;
        const loadingText = document.getElementById('loading-text');
        const preloadedImages = {}; 

        function setImgSrc(imgEl, src) {
            if (preloadedImages[src]) {
                imgEl.src = preloadedImages[src].src; 
            } else {
                imgEl.src = src;
            }
        }

        function startPreload() {
            imagesToPreload.forEach(src => {
                const img = new Image();
                img.onload = () => { preloadedImages[src] = img; checkLoadComplete(); };
                img.onerror = checkLoadComplete;
                img.src = src;
            });
        }

        function checkLoadComplete() {
            loadedCount++;
            const percent = Math.floor((loadedCount / imagesToPreload.length) * 100);
            loadingText.innerText = `${percent}% 완료`;

            if (loadedCount === imagesToPreload.length) {
                setTimeout(() => { showScreen('login-screen'); }, 300);
            }
        }

        startPreload();

        const socket = io();
        let myId = null;
        let isMyTurn = false;
        let currentTarget = null; 
        let myTools = []; 

        const playerImg = document.getElementById('player-img');
        const enemyImg = document.getElementById('enemy-img');

        const TOOL_INFO = {
            'magnifier': { 
                name: '돋보기', 
                desc: '해당 차례에 사용할 탄이 공포탄인지 실탄인지 공개합니다.',
                svg: '<svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>'
            },
            'slug': { 
                name: '슬러그탄', 
                desc: '해당 차례의 실탄이 생명력을 2 깎습니다. 단, 공포탄이면 무효됩니다.',
                svg: '<svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="9" y="8" width="6" height="12" rx="1"/><path d="M9 8 C9 3, 15 3, 15 8"/></svg>'
            },
            'syringe': { 
                name: '주사기', 
                desc: '생명력을 1 회복합니다.',
                svg: '<svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 2l4 4L10 18l-4-4L18 2z M10 18l-4 4-2-2 4-4 M14 6l4 4"/></svg>'
            },
            'phone': { 
                name: '전화기', 
                desc: '장전된 탄 중 하나의 정체를 알려줍니다. (개인에게만)',
                svg: '<svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>'
            },
            'beer': { 
                name: '맥주', 
                desc: '자신에게 쏘기를 해서 공포탄일 경우 생명력을 1 얻습니다.',
                svg: '<svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M17 8h1a4 4 0 110 8h-1"/><rect x="6" y="8" width="11" height="14" rx="1" ry="1"/><path d="M6 8V6a2 2 0 012-2h7a2 2 0 012 2v2"/></svg>'
            }
        };

        document.getElementById('btn-join').addEventListener('click', () => {
            const name = document.getElementById('playerName').value;
            const roomCode = document.getElementById('roomCode').value;
            if (name && roomCode) {
                socket.emit('join_room', { name, roomCode });
                document.getElementById('display-room').innerText = roomCode;
                showScreen('lobby-screen');
            }
        });

        socket.on('update_lobby', (players) => {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            players.forEach(p => {
                if (p.id === socket.id) myId = p.id;
                const li = document.createElement('li');
                li.innerText = `${p.name} - ${p.isReady ? '✅ 준비완료' : '⏳ 대기중'}`;
                list.appendChild(li);
            });
        });

        document.getElementById('btn-ready').addEventListener('click', () => {
            socket.emit('toggle_ready');
        });

        socket.on('start_game', () => {
            showScreen('room-screen');
            bgm.currentTime = 0; 
            if (bgmEnabled) bgm.play();
        });

        socket.on('round_started', (data) => {
            currentStage = data.stage; 
            playSFX(sfxStage); 
            
            const stageOverlay = document.getElementById('stage-overlay');
            stageOverlay.innerText = `STAGE ${data.stage}`;
            stageOverlay.classList.add('stage-active');
            
            updateButtonsState(false);

            setTimeout(() => {
                stageOverlay.classList.remove('stage-active');
                playSFX(sfxStageReload);
                
                const coloredBulletText = `실탄: ${data.live}개, 공포탄: ${data.blank}개 장전됨!`;
                showTurnMessage(coloredBulletText);
                
                setTimeout(() => {
                    renderState(data.turn, data.players, data.total, []);
                }, 2500); 
            }, 2000);
        });

        socket.on('state_update', (data) => {
            renderState(data.turn, data.players, data.total, data.revealed);
        });

        function renderState(turnId, players, totalBullets, revealedBullets) {
            isMyTurn = (turnId === myId);
            
            // 스테이지 정보 업데이트
            document.getElementById('current-stage-num').innerText = currentStage;
            
            // My Turn 네온 인디케이터 업데이트
            const turnStatus = document.getElementById('my-turn-status');
            if (isMyTurn) {
                turnStatus.classList.add('neon-on');
            } else {
                turnStatus.classList.remove('neon-on');
            }

            showTurnMessage(isMyTurn ? "당신의 턴입니다" : "상대방의 턴입니다");
            
            updateButtonsState(isMyTurn);
            resetActionButtons(); 
            setImgSrc(playerImg, 'images/player_stand.png');
            setImgSrc(enemyImg, 'images/enemy_stand.png');

            Object.keys(players).forEach(id => {
                const hpString = '⚡️'.repeat(players[id].hp); 
                if (id === myId) {
                    document.getElementById('player-health').innerText = hpString;
                    myTools = players[id].tools;
                    document.getElementById('tool-count').innerText = myTools.length;
                } else {
                    document.getElementById('enemy-health').innerText = hpString;
                }
            });

            const ammoDiv = document.getElementById('ammo-container');
            ammoDiv.innerHTML = '';
            for (let i = 0; i < totalBullets; i++) {
                const shell = document.createElement('div');
                shell.classList.add('shell');
                if (i < revealedBullets.length) {
                    shell.classList.add(revealedBullets[i] === 'live' ? 'red' : 'grey');
                } else {
                    shell.classList.add('green');
                }
                ammoDiv.appendChild(shell);
            }
        }

        function openToolModal() {
            if (!isMyTurn) return;
            if (myTools.length === 0) {
                alert('현재 보유 중인 도구가 없습니다.');
                return;
            }
            resetActionButtons(); 
            setImgSrc(playerImg, 'images/player_stand.png');
            const toolId = myTools[0]; 
            const tool = TOOL_INFO[toolId];
            document.getElementById('modal-icon').innerHTML = tool.svg;
            document.getElementById('modal-name').innerText = `${tool.name}`;
            document.getElementById('modal-desc').innerText = tool.desc;
            document.getElementById('tool-modal').style.display = 'flex';
        }

        function closeToolModal() {
            document.getElementById('tool-modal').style.display = 'none';
        }

        function confirmToolUse() {
            socket.emit('use_tool');
            closeToolModal();
        }

        socket.on('tool_used', (data) => {
            showTurnMessage(data.message);
            
            Object.keys(data.players).forEach(id => {
                const hpString = '⚡️'.repeat(data.players[id].hp);
                if (id === myId) {
                    document.getElementById('player-health').innerText = hpString;
                    myTools = data.players[id].tools;
                    document.getElementById('tool-count').innerText = myTools.length;
                } else {
                    document.getElementById('enemy-health').innerText = hpString;
                }
            });
        });

        socket.on('tool_private', (msg) => {
            alert(`[도구 확인 결과]\n${msg}`);
        });

        function resetActionButtons() {
            if (currentTarget) socket.emit('player_action', 'cancel_aim');
            currentTarget = null;
            const btnSelf = document.getElementById('btn-self');
            const btnEnemy = document.getElementById('btn-enemy');
            btnSelf.innerText = '본인에게 겨눈다';
            btnEnemy.innerText = '상대에게 겨눈다';
            btnSelf.classList.remove('confirm');
            btnEnemy.classList.remove('confirm');
        }

        function updateButtonsState(enabled) {
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.disabled = !enabled;
            });
        }

        function handleActionClick(action) {
            if (!isMyTurn) return;
            if (action === 'self') {
                if (currentTarget === 'self') {
                    updateButtonsState(false);
                    socket.emit('shoot', 'self');
                } else {
                    resetActionButtons();
                    currentTarget = 'self';
                    playSFX(sfxAimingMe); // [수정됨]
                    playerImg.src = 'images/player_shot_fake.png'; 
                    socket.emit('player_action', 'aim_self'); 
                    const btn = document.getElementById('btn-self');
                    btn.innerText = '본인에게 쏘기';
                    btn.classList.add('confirm');
                }
            } else if (action === 'enemy') {
                if (currentTarget === 'enemy') {
                    updateButtonsState(false);
                    socket.emit('shoot', 'enemy');
                } else {
                    resetActionButtons();
                    currentTarget = 'enemy';
                    playSFX(sfxAiming); // [수정됨]
                    playerImg.src = 'images/player_shot.png'; 
                    socket.emit('player_action', 'aim_enemy'); 
                    const btn = document.getElementById('btn-enemy');
                    btn.innerText = '상대에게 쏘기';
                    btn.classList.add('confirm');
                }
            }
        }

        socket.on('enemy_action', (action) => {
            if (action === 'aim_self') {
                playSFX(sfxAimingMeEnemy); // [수정됨]
                setImgSrc(enemyImg, 'images/enemy_shot_fake.png');
            } else if (action === 'aim_enemy') {
                playSFX(sfxAimingEnemy); // [수정됨]
                setImgSrc(enemyImg, 'images/enemy_shot.png');
            } else if (action === 'cancel_aim') {
                setImgSrc(enemyImg, 'images/enemy_stand.png');
            }
        });

        function triggerFlash() {
            const flash = document.getElementById('flash-overlay');
            flash.classList.add('flash-active');
            setTimeout(() => { flash.classList.remove('flash-active'); }, 100); 
        }

        socket.on('shoot_action', (data) => {
            const { shooter, target, bullet, players } = data;
            playShot(bullet === 'live'); 

            if (bullet === 'live') triggerFlash();

            if (bullet === 'live' && target === 'enemy' && shooter !== myId) {
                playSFX(sfxHurt); // [수정됨]
                triggerHearingEffect();
            }
            if (bullet === 'live' && target === 'self' && shooter === myId) {
                playSFX(sfxHurt); // [수정됨]
                triggerHearingEffect();
            }

            if (bullet === 'live' && target === 'enemy' && shooter === myId) {
                playSFX(sfxHurtEnemy); // [수정됨]
            }

            const coloredBulletText = bullet === 'live' 
                ? '<span style="color: #ff4444;">실탄</span>' 
                : '<span style="color: #aaaaaa;">공포탄</span>';
            showTurnMessage(`[${coloredBulletText}]이 발사 되었습니다.`);

            const shells = document.querySelectorAll('#ammo-container .shell.green');
            if (shells.length > 0) {
                shells[0].classList.remove('green');
                shells[0].classList.add(bullet === 'live' ? 'red' : 'grey');
            }

            Object.keys(players).forEach(id => {
                const hpString = '⚡️'.repeat(players[id].hp);
                if (id === myId) document.getElementById('player-health').innerText = hpString;
                else document.getElementById('enemy-health').innerText = hpString;
            });

            if (shooter === myId) {
                if (target === 'enemy' && bullet === 'live') {
                    enemyImg.classList.add('shake-enemy-active');
                    setImgSrc(enemyImg, 'images/eh1.png');
                    setTimeout(() => { setImgSrc(enemyImg, 'images/eh2.png'); }, 100);
                    setTimeout(() => { setImgSrc(enemyImg, 'images/eh3.png'); }, 200);
                    setTimeout(() => {
                        setImgSrc(enemyImg, 'images/enemy_stand.png');
                        enemyImg.classList.remove('shake-enemy-active');
                    }, 400);
                }
                setTimeout(() => {
                    setImgSrc(playerImg, 'images/player_reload.png');
                    setTimeout(() => {
                        playReload();
                        setImgSrc(playerImg, 'images/player_reload_ok.png');
                        setTimeout(() => { setImgSrc(playerImg, 'images/player_stand.png'); }, 500);
                    }, 500);
                }, 500);
            } else {
                if (target === 'self' && bullet === 'live') {
                    enemyImg.classList.add('shake-enemy-active');
                    setImgSrc(enemyImg, 'images/ef1.png');
                    setTimeout(() => { setImgSrc(enemyImg, 'images/ef2.png'); }, 100);
                    setTimeout(() => { setImgSrc(enemyImg, 'images/ef3.png'); }, 200);
                    setTimeout(() => {
                        setImgSrc(enemyImg, 'images/enemy_shot_fake.png');
                        enemyImg.classList.remove('shake-enemy-active');
                    }, 300);
                }
                if (target === 'enemy' && bullet === 'live') {
                    playerImg.classList.add('shake-player-active');
                    setImgSrc(playerImg, 'images/ph1.png');
                    setTimeout(() => { setImgSrc(playerImg, 'images/ph2.png'); }, 100);
                    setTimeout(() => { setImgSrc(playerImg, 'images/ph3.png'); }, 200);
                    setTimeout(() => { setImgSrc(playerImg, 'images/ph4.png'); }, 300);
                    setTimeout(() => {
                        setImgSrc(playerImg, 'images/player_stand.png');
                        playerImg.classList.remove('shake-player-active');
                    }, 500);
                }
                setTimeout(() => {
                    setImgSrc(enemyImg, 'images/enemy_reload1.png');
                    setTimeout(() => {
                        setImgSrc(enemyImg, 'images/enemy_reload2.png');
                        setTimeout(() => {
                            playReload();
                            setImgSrc(enemyImg, 'images/enemy_reload_ok.png');
                            setTimeout(() => { setImgSrc(enemyImg, 'images/enemy_stand.png'); }, 500);
                        }, 400);
                    }, 400);
                }, 900);
            }
        });

        socket.on('game_over', (data) => {
            if (data.loser === myId) alert('생명력을 모두 잃었습니다. 패배!');
            else alert('상대방이 쓰러졌습니다. 승리!');
            
            const fadeInterval = setInterval(() => {
                if (bgm.volume > 0.05) {
                    bgm.volume -= 0.05;
                } else {
                    bgm.volume = 0;
                    bgm.pause();
                    bgm.currentTime = 0; 
                    bgm.volume = 1;      
                    clearInterval(fadeInterval);
                }
            }, 150); 
            setTimeout(() => { location.reload(); }, 3500);
        });
    </script>
</body>
</html>
